<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Profil Pasien - ASET-TB</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Atkinson+Hyperlegible+Next:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
</head>
<body class="bg-[#f9f9ff] text-[#181c23] min-h-screen font-[Atkinson_Hyperlegible_Next]">
<header class="sticky top-0 z-50 flex justify-between items-center px-4 h-16 w-full max-w-3xl mx-auto bg-[#f1f3fe] shadow-sm">
<div class="flex items-center gap-3">
<button class="p-2 rounded-full hover:bg-[#e0e2ed]" data-nav="dashboard"><span class="material-symbols-outlined text-[#0059bb]">arrow_back</span></button>
<h1 class="font-[Manrope] text-2xl font-bold text-[#0059bb]">Profil</h1>
</div>
</header>
<main class="w-full max-w-3xl mx-auto px-4 py-6 pb-28 space-y-4">
<section class="bg-white rounded-xl border border-[#c1c6d7]/40 p-6 shadow-sm">
<div class="flex items-center gap-4">
<div class="w-20 h-20 rounded-full bg-[#d8e2ff] overflow-hidden flex items-center justify-center">
<img id="profile-avatar" alt="User Profile" class="hidden w-full h-full object-cover"/>
<span class="material-symbols-outlined text-4xl text-[#0059bb]">person</span>
</div>
<div>
<h2 id="profile-name" class="font-[Manrope] text-2xl font-bold">Memuat...</h2>
<p id="profile-email" class="text-[#414754]">-</p>
</div>
</div>
</section>
<section class="grid grid-cols-1 sm:grid-cols-2 gap-4">
<div class="bg-white rounded-xl border border-[#c1c6d7]/40 p-5 shadow-sm">
<p class="text-[#414754] text-sm">Nomor Rekam Medis</p>
<p id="profile-mrn" class="font-[Manrope] text-xl font-bold mt-1">-</p>
</div>
<div class="bg-white rounded-xl border border-[#c1c6d7]/40 p-5 shadow-sm">
<p class="text-[#414754] text-sm">Fase Pengobatan</p>
<p id="profile-phase" class="font-[Manrope] text-xl font-bold mt-1">-</p>
</div>
<div class="bg-white rounded-xl border border-[#c1c6d7]/40 p-5 shadow-sm">
<p class="text-[#414754] text-sm">Hari Jadwal Berjalan</p>
<p id="profile-day" class="font-[Manrope] text-xl font-bold mt-1">-</p>
</div>
<div class="bg-white rounded-xl border border-[#c1c6d7]/40 p-5 shadow-sm">
<p class="text-[#414754] text-sm">Self-Efficacy Hari Ini</p>
<p id="profile-self" class="font-[Manrope] text-xl font-bold mt-1">-</p>
</div>
<div class="bg-white rounded-xl border border-[#c1c6d7]/40 p-5 shadow-sm">
<p class="text-[#414754] text-sm">Kepatuhan Database</p>
<p id="profile-adherence" class="font-[Manrope] text-xl font-bold mt-1">-</p>
</div>
<div class="bg-white rounded-xl border border-[#c1c6d7]/40 p-5 shadow-sm">
<p class="text-[#414754] text-sm">Estimasi Selesai</p>
<p id="profile-estimated" class="font-[Manrope] text-xl font-bold mt-1">-</p>
</div>
<div class="bg-white rounded-xl border border-[#c1c6d7]/40 p-5 shadow-sm sm:col-span-2">
<p class="text-[#414754] text-sm">Nilai Motivasi Hari Ini</p>
<p id="profile-motivation" class="font-[Manrope] text-xl font-bold mt-1">-</p>
</div>
</section>
<button id="logout-button" class="w-full h-12 rounded-lg border border-[#ba1a1a] text-[#ba1a1a] font-[Manrope] font-bold">Keluar</button>
</main>
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 h-20 bg-white shadow-lg rounded-t-xl">
<button data-nav="dashboard" class="flex flex-col items-center text-[#414754]"><span class="material-symbols-outlined">home</span><span>Home</span></button>
<button data-nav="schedule" class="flex flex-col items-center text-[#414754]"><span class="material-symbols-outlined">pill</span><span>Schedule</span></button>
<button data-nav="chatbot" class="flex flex-col items-center text-[#414754]"><span class="material-symbols-outlined">smart_toy</span><span>Assistant</span></button>
<button data-nav="profile" class="flex flex-col items-center text-[#007354]"><span class="material-symbols-outlined">person</span><span>Profile</span></button>
</nav>
<script src="/public/app.js?v=20260609-login-clean"></script>
</body>
</html>
